<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construmaster</title>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #FFD700;
}

html {
  scroll-behavior: smooth;
}

/* ===== TOP BAR ===== */
.topbar {
  background: black;
  color: white;
  text-align: right;
  padding: 8px 20px;
}

/* ===== NAVBAR ===== */
.navbar {
  background: #e6e6e6;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 60px 20px 20px; /* espacio arriba para logo */
  position: relative;
  overflow: visible;
}

/* ===== LOGO ===== */
.logo-container {
  position: absolute;
  top: -70px;
  left: 40px;
  z-index: 10;
}

.logo-circle {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 6px solid #FFD700;
  background: black;
  object-fit: cover;
}

/* ===== MENU ===== */
.menu {
  list-style: none;
  display: flex;
  gap: 40px;
  margin: 0;
  padding: 0;
}

.menu li {
  position: relative;
}

.menu a {
  text-decoration: none;
  color: black;
  font-weight: bold;
  padding: 10px;
  display: block;
}

/* SUBMENU */
.submenu {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: black;
  list-style: none;
  padding: 0;
  min-width: 150px;
}

.submenu li a {
  color: white;
  padding: 10px;
}

.menu li:hover .submenu {
  display: block;
}

.submenu li a:hover {
  background: #FFD700;
  color: black;
}

/* ===== CONTENIDO ===== */
main {
  background: black;
  max-width: 1000px;
  margin: 0 auto;
  padding: 40px 0;
  color: white;
  text-align: center;
  overflow: visible;
}

/* VIDEO */
.video-slider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

.video-frame {
  border: 8px solid #FFD700;
  border-radius: 12px;
}

.video-frame iframe {
  width: 720px;
  max-width: 100%;
  height: 400px;
  display: block;
}

.prev, .next {
  background: transparent;
  color: white;
  font-size: 40px;
  border: none;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: black;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>

</head>

<body>

<!-- TOP -->
<header class="topbar">
  Contacto: construmaster@gmail.com
</header>

<!-- NAV -->
<nav class="navbar">
  <div class="logo-container">
    <img src="logo.png" class="logo-circle">
  </div>

  <ul class="menu">
    <li>
      <a href="#inicio">INICIO</a>
      <ul class="submenu">
        <li><a href="#">Opción 1</a></li>
        <li><a href="#">Opción 2</a></li>
        <li><a href="#">Opción 3</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Proyectos</a>
      <ul class="submenu">
        <li><a href="#">Opción 1</a></li>
        <li><a href="#">Opción 2</a></li>
        <li><a href="#">Opción 3</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Licencias</a>
      <ul class="submenu">
        <li><a href="#">Opción 1</a></li>
        <li><a href="#">Opción 2</a></li>
        <li><a href="#">Opción 3</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Cotizar</a>
      <ul class="submenu">
        <li><a href="#">Opción 1</a></li>
        <li><a href="#">Opción 2</a></li>
        <li><a href="#">Opción 3</a></li>
      </ul>
    </li>
  </ul>
</nav>

<!-- CONTENIDO -->
<main>

<h2 id="inicio">Inicio</h2>

<div class="video-slider">
  <button class="prev" onclick="cambiarVideo(-1)">❮</button>

  <div class="video-frame">
    <iframe id="videoPlayer"
      src="https://www.youtube.com/embed/UJKqewleNxg"
      allowfullscreen>
    </iframe>
  </div>

  <button class="next" onclick="cambiarVideo(1)">❯</button>
</div>

</main>

<footer>
  WhatsApp: +57 313 3954816
</footer>

<script>
const videos = ["UJKqewleNxg"];
let i = 0;

function cambiarVideo(dir) {
  i = (i + dir + videos.length) % videos.length;
  document.getElementById("videoPlayer").src =
    "https://www.youtube.com/embed/" + videos[i];
}
</script>

</body>
</html>
